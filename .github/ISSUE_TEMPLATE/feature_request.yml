name: Feature request
description: Suggest a new CLI capability or inventory improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow gap are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Links, papers, API docs, or examples
